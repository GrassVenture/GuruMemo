# PR-Agent Configuration File

[config]
response_language="ja-JP"

[pr_description]
enable=false  # PR説明の自動生成を無効化

[pr_reviewer]
enable=true  # コードレビュー機能を有効化
persistent_comment=true
extra_instructions = "Please use Japanese in comments. レビューの際には code_standards.md に記載されているFlutterコード規約に基づいてレビューを行ってください。PRの説明は編集せず、コードレビューとコメントのみを行ってください。"

[pr_code_suggestions]
enable=true  # コード提案機能を有効化
extra_instructions = "Please use Japanese in suggestions. コードの改善提案は code_standards.mdのFlutterコード規約に基づいて行ってください。PR説明は変更しないでください。"
focus_only_on_problems=true
persistent_comment=true

[best_practices]
content = "code_standards.md"
enable_global_best_practices = true

[github_action_config]
auto_review = false
auto_describe = false
auto_improve = false