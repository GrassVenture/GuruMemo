# PR-Agent Configuration File

[config]
response_language="ja-JP"

[pr_description]
enable=false  # PR説明の自動生成を無効化

[pr_reviewer]
enable=true  # コードレビュー機能を有効化
persistent_comment=true
extra_instructions = "Please review the code based on the Flutter code standards in code_standards.md. Please do not edit the PR description, only perform code reviews and comments."

[pr_code_suggestions]
enable=true  # コード提案機能を有効化
extra_instructions = "Please use Japanese in suggestions. Please make code improvement suggestions based on the Flutter code standards in code_standards.md. Please do not change the PR description."
focus_only_on_problems=true
persistent_comment=true

[best_practices]
content = "code_standards.md"
enable_global_best_practices = true

[github_action_config]
auto_review = false
auto_describe = false
auto_improve = false