# PR-Agent Configuration File

[config]
response_language="ja-JP"

[pr_description]
add_original_user_description=false # PR説明の自動生成を無効化
extra_instructions = "Please use Japanese in the description."

[pr_reviewer]
persistent_comment=true
extra_instructions = "Please use Japanese in the description. Please review the code based on the Flutter code standards in code_standards.md. Please do not edit the PR description, only perform code reviews and comments."

[pr_code_suggestions]
extra_instructions = "Please use Japanese in the description. Please make code improvement suggestions based on the Flutter code standards in code_standards.md. Please do not change the PR description."
focus_only_on_problems=true
persistent_comment=true

[pr_update_changelog]
extra_instructions = "Please use Japanese in the description."

[best_practices]
content = "code_standards.md"
enable_global_best_practices = true

[github_action_config]
auto_review = true
auto_describe = false
auto_improve = false